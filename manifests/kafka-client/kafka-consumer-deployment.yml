apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-consumer

spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka-consumer
  replicas: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka-consumer
        app.kubernetes.io/component: kafka-consumer
    spec:
      containers:
      - name: kafka-consumer
        image: singhritesh85/kafka-consumer:TAG_NUMBER
        ports:
        - containerPort: 8080
          name: http
        imagePullPolicy: Always
        env:
        - name: TRUSTSTORE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: kafka-consumer-app
              key: truststore.password
        - name: KEYSTORE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: kafka-consumer-app
              key: keystore.password
        - name: SPRING_CONFIG_LOCATION
          value: file:///tmp/config/application.yml 
        volumeMounts:
        - name: kafka-consumer-secret
          mountPath: /tmp/secret
        - name: kafka-consumer-config
          mountPath: /tmp/config
      volumes:
      - name: kafka-consumer-secret
        secret:
          secretName: kafka-consumer-app
      - name: kafka-consumer-config
        configMap:
          name: kafka-consumer-app
      imagePullSecrets:
      - name: producer-consumer-app-secret
